<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTTPFOXY Magazine EPK</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Inter:wght@300;400;500;600&family=Caveat:wght@700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>
</head>
<div class="cursor">
  🎧
</div>
<body>

<div class="dream-overlay"></div>

<div class="video-bg">
  <video autoplay muted loop playsinline>
    <source src="cloudloop.mp4" type="video/mp4">
  </video>
</div>

<div class="stars">
    <span>✦</span>
    <span>✧</span>
    <span>✦</span>
    <span>✧</span>
    <span>✦</span>
    <span>✧</span>
  </div>

<div class="doodles">
  <span class="pixel p1">💙</span>
  <span class="pixel p2">💗</span>
  <span class="pixel p3">✦</span>
  <span class="pixel p4">✧</span>
  <span class="pixel p5">💎</span>
  <span class="pixel p6">✦</span>
  <span class="pixel p7">💙</span>
  <span class="pixel p8">✧</span>
  <span class="pixel p9">💙</span>
  <span class="pixel p10">💗</span>
  <span class="pixel p11">✦</span>
  <span class="pixel p12">✧</span>
  <span class="pixel p13">💎</span>
  <span class="pixel p14">✦</span>
  <span class="pixel p15">💙</span>
  <span class="pixel p16">✧</span>

</div>

<div id="book">

<div class="page cover">
  <img src="page1.jpg" alt="HTTPFOXY Cover" class="cover-image">
</div>

<div class="page cover">
  <img src="page2.jpg" alt="Page 2" class="page-image">
</div>

<div class="page cover">
  <img src="page3.jpg" alt="Page 3" class="page-image">
</div>

<div class="page spread">
  <img src="page4.jpg" class="page-image" alt="Page 4">
</div>

<div class="page spread gif-page audio-page">

  <img src="page5.gif" class="page-image">

  <audio id="page5-audio" src="track.mp3"></audio>

  <button class="audio-btn" id="audioBtn">▶</button>

  <div class="now-playing">
    <span class="np-dot"></span>
    NOW PLAYING 💿
  </div>

</div>

<div class="page cover">
  <img src="page6.jpg" alt="Page 6" class="page-image">
</div>

<div class="page spread">
  <img src="page7.jpg" class="page-image" alt="Page 7">
</div>
</div>

<script src="app.js"></script>
</body>
</html>
